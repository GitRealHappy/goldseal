# Site settings
title: "Gold Seal Mechanical"
email: "goldsealheating@outlook.com"
description: >-
  Licensed mechanical contractors for plumbing, heating, air conditioning,
  and gas services. Residential and commercial. Licensed and insured.

baseurl: "" # the subpath of your site, e.g. /blog
url: "[not yet set]" # the base hostname & protocol for your site

# Company information
company:
  name: "Gold Seal Mechanical"
  phone: "604-551-1512"
  email: "goldsealheating@outlook.com"
  address: "2417 Mt Lehman Rd. Abbotsford BC"
  license: "Licensed & Insured"
  service_area_region: "Fraser Valley & Greater Vancouver area"
  service_area_range: "Chilliwack to North Vancouver"
  service_areas:
    - "Chilliwack"
    - "Abbotsford"
    - "Mission"
    - "Langley"
    - "Surrey"
    - "Vancouver"
    - "Burnaby"
    - "Coquitlam"
    - "North Vancouver"

# Navigation
navigation:
  - name: "Home"
    url: "/"
  - name: "Services"
    url: "/services/"
  - name: "Testimonials"
    url: "/testimonials/"
  - name: "The Library"
    url: "/library/"
  - name: "Rebates"
    url: "/rebates/"
  - name: "Contact"
    url: "/contact/"

# Services offered
services:
  - name: "Plumbing Services"
    description: "Complete plumbing services for residential and commercial properties"
  - name: "Heating"
    description: "Heating system installation, repair, and maintenance"
  - name: "Air Conditioners"
    description: "AC installation, repair, and seasonal maintenance"
  - name: "Gas Work"
    description: "Licensed gas line installation and appliance connections"

# Social media
social:
  facebook: "https://facebook.com/goldsealmechanical"
  twitter: "https://twitter.com/goldsealmech"
  linkedin: "https://linkedin.com/company/gold-seal-mechanical"
  google_business: "https://g.page/goldsealmechanical"

# Blog settings
blog:
  paginate: 6
  paginate_path: "/library/page:num/"

# Build settings
markdown: kramdown
highlighter: rouge
theme: minima

# Plugins
plugins:
  - jekyll-feed
  - jekyll-sitemap
  - jekyll-seo-tag
  - jekyll-paginate

# Pagination (for blog index at articles/index.html)
paginate: 6
paginate_path: "/library/page:num/"

# Collections
collections:
  testimonials:
    output: false
  services:
    output: true
    permalink: /services/:name/

# Defaults
defaults:
  - scope:
      path: ""
      type: "posts"
    values:
      layout: "post"
      author: "Gold Seal Mechanical"
      permalink: /library/:year/:month/:day/:title/
  - scope:
      path: ""
      type: "pages"
    values:
      layout: "page"
  - scope:
      path: ""
      type: "services"
    values:
      layout: "page"

# Exclude from processing
exclude:
  - Gemfile
  - Gemfile.lock
  - node_modules
  - vendor/bundle/
  - vendor/cache/
  - vendor/gems/
  - vendor/ruby/
  - README.md
  - LICENSE
  - .gitignore

# SEO settings
google_analytics: # Add your GA tracking ID here
google_site_verification: # Add your Google site verification code here

# Contact form settings (for future implementation)
contact_form:
  action: "#" # Will be updated when form handling is implemented
  method: "POST"
